backend:
  name: github
  repo: sandeepduhan8/QuickITFix
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
  site_id: e6a16210-729e-47bb-89da-4baf08bbbebd

media_folder: assets/images
public_folder: /assets/images

collections:
  - name: posts
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish Date
        name: date
        widget: datetime
      - label: Category
        name: category
        widget: select
        options:
          - label: Cybersecurity
            value: cybersecurity
          - label: Cloud Computing
            value: cloud
          - label: Networking
            value: networking
          - label: Windows
            value: windows
          - label: Linux
            value: linux
          - label: DevOps
            value: devops
          - label: AI & ML
            value: ai
          - label: Tech News
            value: news
      - label: Author
        name: author
        widget: string
        default: Sandeep Duhan
      - label: Read Time
        name: read_time
        widget: string
        default: 5 min
      - label: Description
        name: description
        widget: text
      - label: Featured
        name: featured
        widget: boolean
        default: false
      - label: Body
        name: body
        widget: markdown

  - name: quizzes
    label: Quizzes
    folder: _quizzes
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Topic
        name: topic
        widget: select
        options:
          - label: Networking
            value: networking
          - label: Cybersecurity
            value: cybersecurity
          - label: Cloud Computing
            value: cloud
          - label: Linux
            value: linux
          - label: Windows
            value: windows
          - label: DevOps
            value: devops
          - label: CompTIA
            value: comptia
          - label: AWS
            value: aws
          - label: Azure
            value: azure
      - label: Difficulty
        name: difficulty
        widget: select
        options:
          - Beginner
          - Intermediate
          - Advanced
      - label: Duration
        name: duration
        widget: string
        default: 10 mins
      - label: Description
        name: description
        widget: text
      - label: Published
        name: published
        widget: boolean
        default: true
      - label: Questions
        name: questions
        widget: list
        fields:
          - label: Question
            name: question
            widget: string
          - label: Options
            name: options
            widget: list
            field:
              label: Option
              name: option
              widget: string
          - label: Correct Answer
            name: correct
            widget: string
          - label: Explanation
            name: explanation
            widget: text
            required: false

  - name: pages
    label: Pages
    files:
      - label: Homepage
        name: home
        file: _data/home.json
        fields:
          - label: Hero Title
            name: hero_title_1
            widget: string
          - label: Hero Accent Text
            name: hero_title_2
            widget: string
          - label: Hero Subtitle
            name: hero_subtitle
            widget: text
          - label: Stat 1 Number
            name: stat1_num
            widget: string
          - label: Stat 1 Label
            name: stat1_label
            widget: string
          - label: Stat 2 Number
            name: stat2_num
            widget: string
          - label: Stat 2 Label
            name: stat2_label
            widget: string
          - label: Stat 3 Number
            name: stat3_num
            widget: string
          - label: Stat 3 Label
            name: stat3_label
            widget: string
      - label: About Page
        name: about
        file: _data/about.json
        fields:
          - label: Mission Title
            name: mission_title
            widget: string
          - label: Mission Text
            name: mission_text
            widget: text
          - label: Team Members
            name: team
            widget: list
            fields:
              - label: Name
                name: name
                widget: string
              - label: Initials
                name: initials
                widget: string
              - label: Role
                name: role
                widget: string
              - label: Bio
                name: bio
                widget: text